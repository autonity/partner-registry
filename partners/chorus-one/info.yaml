name: 'Chorus One'
short_description: 'Chorus One is a leading institutional staking provider.'
long_description: 'Chorus One is a leading institutional staking provider, managing over $3 billion in assets across more than 60 Proof-of-Stake networks. Established in 2018, it has been at the forefront of the staking industry, delivering simplified, enterprise-grade solutions that are trusted by institutions and investors alike. In addition to providing staking services, Chorus One publishes influential research and invests in cutting-edge protocols through Chorus One Ventures. The company is ISO 27001 certified and offers robust security, high MEV rewards, and comprehensive insurance against slashing and double signing, making Chorus One a trusted partner in the institutional staking space.'
